<header>
  <nav>
    <div class="nav-left">
      <h1 class="logo">Lost &amp; Found</h1>
    </div>

    <div class="nav-right">
      <div class="profile-container" (click)="toggleMenu()">
        <img src="assets/icons/icons8-profile.gif" alt="Profilis" class="avatar">

        @if (menuOpen) {
          <div class="dropdown" (click)="$event.stopPropagation()">
            <p class="username">Sveikas, {{ user?.username }}</p>
            <button routerLink="/profile">Profilis</button>
            <button routerLink="/create-post">Įkelti skelbimą</button>
            <button (click)="logout()">Atsijungti</button>
          </div>
        }
      </div>
    </div>
  </nav>
</header>

<form id="post-form" (ngSubmit)="onSubmit()" #postForm="ngForm">
  <h2>Įkelti skelbimą</h2>

  <select id="type" name="type" [(ngModel)]="type" required>
    <option value="">Pasirinkite tipą</option>
    <option value="found">Radau</option>
    <option value="lost">Pamečiau</option>
  </select>

  <select id="categoryID" name="categoryID" [(ngModel)]="categoryID" required>
    <option [ngValue]="0">Pasirinkite kategoriją</option>
    <option [ngValue]="2">Elektronika</option>
    <option [ngValue]="3">Apranga</option>
    <option [ngValue]="4">Raktai</option>
    <option [ngValue]="5">Dokumentai</option>
    <option [ngValue]="1">Kita</option>
  </select>

  <select id="location" name="location" [(ngModel)]="location" required>
    <option value="">Pasirinkite vietą</option>
    <option value="Vilnius">Vilnius</option>
    <option value="Kaunas">Kaunas</option>
    <option value="Klaipėda">Klaipėda</option>
    <option value="Šiauliai">Šiauliai</option>
    <option value="Panevėžys">Panevėžys</option>
  </select>

  <input type="text" placeholder="Title" id="title" name="title" [(ngModel)]="title" required />
  <textarea placeholder="Description" id="description" name="description" [(ngModel)]="description" required></textarea>
  <input type="file" accept="image/*" (change)="onFileSelected($event)" />

  <div *ngIf="previewUrl">
    <img [src]="previewUrl" width="200" />
  </div>

  <button type="submit">Įkelti</button>
</form>
