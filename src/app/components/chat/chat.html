<div class="chat-container">

  <h2>Pokalbis</h2>

  <div class="messages">

    @for (msg of messages(); track msg.messageID) {
      <div class="message">

        <strong>
          {{ msg.senderUsername }}
        </strong>

        <p>
          {{ msg.text }}
        </p>

        <small>
          {{ msg.sentAt | date:'yyyy-MM-dd HH:mm' }}
        </small>

      </div>
    }

  </div>

  <div class="send-box">

    <input
      type="text"
      [(ngModel)]="newMessage"
      placeholder="Rašyti žinutę..."
      (keydown.enter)="sendMessage()"
    >

    <button (click)="sendMessage()">
      Siųsti
    </button>

  </div>

</div>
