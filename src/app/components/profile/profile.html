<header>
  <nav>
    <div class="nav-left">
      <a href="/home" class="logo">Lost & Found</a>
    </div>
    <div class="nav-right">
      <div class="profile-container" (click)="toggleMenu()">
        <img src="assets/icons/icons8-profile.gif" alt="Profilis">
        @if (menuOpen) {
          <div class="dropdown" (click)="$event.stopPropagation()">
            <p class="username">Sveikas, {{ user?.username }}</p>

            <button routerLink="/profile">Profilis</button>
            <button routerLink="/create-post">Įkelti skelbimą</button>
            <button class="btn" (click)="logout()" id="logout-btn">Atsijungti</button>
          </div>
        }
      </div>
    </div>
  </nav>
</header>
<main>
  <section class="profile">
    <h1>Mano profilis</h1>
    <div class="profile-info">
      <p><strong>Vardas:</strong> <span id="user-name"> {{ username }}</span></p>
      <p><strong>El. paštas:</strong> <span id="user-email"> {{ email }}</span></p>
      <button class="btn" id="edit-profile-btn">Redaguoti profilį</button>
    </div>
  </section>
  <section class="profile-ads">
    <h1>Mano skelbimai</h1>
  </section>
</main>
